name: Publish to PyPI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Check if version needs publishing
        id: check
        run: |
          version=$(grep '^version = ' pyproject.toml | head -1 | sed 's/^version = "\(.*\)"/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"

          if git rev-parse "v$version" >/dev/null 2>&1; then
            echo "Tag v$version already exists — nothing to publish"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pypi_ver=$(curl -sL "https://pypi.org/pypi/ssserve/json" | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['version'])" 2>/dev/null || echo "")
          if [ "$version" = "$pypi_ver" ]; then
            echo "Version $version already on PyPI — nothing to publish"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Build
        if: steps.check.outputs.changed == 'true'
        run: uv build

      - name: Publish to PyPI
        if: steps.check.outputs.changed == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create tag
        if: steps.check.outputs.changed == 'true'
        run: |
          version=${{ steps.check.outputs.version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v$version"
          git push origin "v$version"
