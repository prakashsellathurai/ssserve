name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  asv:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --group dev

      - name: Validate benchmarks are well-formed
        run: uv run asv check --python=same

      - name: Run benchmarks (quick)
        run: |
          uv run asv machine --yes
          uv run asv run --python=same --quick --show-stderr \
            --set-commit-hash=$(git rev-parse HEAD)

      - name: Publish benchmark HTML
        run: uv run asv publish

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: asv-results
          path: .asv/
