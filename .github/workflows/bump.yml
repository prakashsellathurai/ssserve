name: Bump version

on:
  workflow_dispatch:
    inputs:
      part:
        description: Part to bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Bump version
        id: bump
        run: |
          new_version=$(python -c "
import re

part = '${{ github.event.inputs.part }}'

with open('pyproject.toml') as f:
    content = f.read()

match = re.search(r'^version = \"(\d+)\.(\d+)\.(\d+)\"', content, re.MULTILINE)
major, minor, patch = int(match.group(1)), int(match.group(2)), int(match.group(3))

if part == 'major':
    major += 1
    minor = 0
    patch = 0
elif part == 'minor':
    minor += 1
    patch = 0
else:
    patch += 1

new_version = f'{major}.{minor}.{patch}'
content = re.sub(r'^version = \"\d+\.\d+\.\d+\"', f'version = \"{new_version}\"', content, flags=re.MULTILINE)

with open('pyproject.toml', 'w') as f:
    f.write(content)

print(new_version)
")
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Create PR
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "bump version to ${{ steps.bump.outputs.new_version }}"
          title: "Bump version to ${{ steps.bump.outputs.new_version }}"
          branch: bump/v${{ steps.bump.outputs.new_version }}
          delete-branch: true
